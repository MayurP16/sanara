name: Bug report
description: Report a defect in Sanara behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Include workflow snippet and command sequence.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version, tag, or commit
      placeholder: v0.1.0-alpha.1 or abc1234
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      description: Where did you observe the issue?
      options:
        - GitHub Action
        - Local CLI
        - Docker image
        - Other
    validations:
      required: true
  - type: input
    id: terraform_version
    attributes:
      label: Terraform version
      placeholder: 1.10.5
  - type: input
    id: checkov_version
    attributes:
      label: Checkov version
      placeholder: 3.2.504
  - type: textarea
    id: artifacts
    attributes:
      label: Relevant artifacts
      description: Paste sanitized excerpts from runlog/run_summary/rescan results.
  - type: markdown
    attributes:
      value: "Do not include secrets or sensitive infrastructure details."
