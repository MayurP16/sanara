name: changelog

on:
  pull_request:

concurrency:
  group: changelog-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: read

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            const labels = (pr.labels || []).map(l => l.name);
            if (labels.includes('no-changelog')) {
              core.info('Skipping changelog check due to no-changelog label.');
              return;
            }
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });
            const changed = files.map(f => f.filename);
            const changelogExemptPaths = [
              'docs/',
              '.github/',
              'tests/',
              'scripts/',
              'simulations/',
            ];
            const changelogExemptFiles = new Set([
              'README.md',
              'CHANGELOG.md',
              'AGENTS.md',
              'ARCHITECTURE.md',
              'CODE_OF_CONDUCT.md',
              'CONTRIBUTING.md',
              'LICENSE',
              'NOTICE',
              'SECURITY.md',
              'SUPPORT.md',
            ]);
            const requiresChangelog = changed.some(f =>
              !changelogExemptPaths.some(prefix => f.startsWith(prefix)) &&
              !changelogExemptFiles.has(f)
            );
            const hasChangelog = changed.includes('CHANGELOG.md');
            if (requiresChangelog && !hasChangelog) {
              core.setFailed('Code changes detected without CHANGELOG.md update. Add entry or label PR with no-changelog.');
            }
