name: release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Validate version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/check_version_consistency.sh "$TAG_VERSION"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Tests
        run: python -m pytest

  publish:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  move-floating-tags:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Move major/minor tags
        run: |
          TAG="${GITHUB_REF_NAME}"       # vX.Y.Z
          VER="${TAG#v}"                 # X.Y.Z
          MAJOR="${VER%%.*}"             # X
          REST="${VER#*.}"               # Y.Z
          MINOR="${REST%%.*}"            # Y

          MAJOR_TAG="v${MAJOR}"
          MINOR_TAG="v${MAJOR}.${MINOR}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -f "$MAJOR_TAG" "$TAG"
          git tag -f "$MINOR_TAG" "$TAG"
          git push -f origin "$MAJOR_TAG" "$MINOR_TAG"
